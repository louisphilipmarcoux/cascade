name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + doc + deny
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo doc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources bans

  research:
    name: research (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
        working-directory: research
      - run: uv run ruff check && uv run ruff format --check
        working-directory: research
      - run: uv run pytest
        working-directory: research
      - name: Notebook smoke (papermill on committed fixture, offline)
        run: |
          mkdir -p ../artifacts/notebooks
          for nb in 01-stylized-facts 02-hawkes-fit 03-simulator-validation 04-hurst; do
            uv run papermill "notebooks/$nb.ipynb" "../artifacts/notebooks/$nb-executed.ipynb"
          done
        working-directory: research

  kani:
    name: formal verification (kani)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Kani proofs (matching-engine K1-K6)
        uses: model-checking/kani-github-action@v1.1
        with:
          args: -p matching-engine

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --all-features --profile ci
      - run: cargo test --workspace --doc
