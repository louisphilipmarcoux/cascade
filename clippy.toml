# Determinism guardrails. The simulation must be a pure function of
# (scenario, seed): no nondeterministic iteration order, no wall clock.
# See docs/determinism.md.

disallowed-types = [
    { path = "std::collections::HashMap", reason = "nondeterministic iteration order; use BTreeMap where order is observable, rustc_hash::FxHashMap for point lookups that are never iterated" },
    { path = "std::collections::HashSet", reason = "nondeterministic iteration order; use BTreeSet, or rustc_hash::FxHashSet for membership checks that are never iterated" },
]

disallowed-methods = [
    { path = "std::time::SystemTime::now", reason = "wall clock is banned in simulation paths; use sim_core::SimTime. Report metadata in the CLI may #[allow(clippy::disallowed_methods)] at the call site with a comment" },
    { path = "std::time::Instant::now", reason = "wall clock is banned in simulation paths; bench harnesses and the CLI may #[allow(clippy::disallowed_methods)] at the call site with a comment" },
]
