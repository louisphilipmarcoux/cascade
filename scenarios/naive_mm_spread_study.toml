# Study: sweep the naive MM's half-spread — a real K-trial set whose best
# variant gets an honestly deflated Sharpe (Bailey & López de Prado).
# Run: quant-sim run scenarios/naive_mm_spread_study.toml --format both

[meta]
name = "naive-mm-spread-study"
description = "Half-spread sweep; DSR of the best variant vs selection luck"

[run]
seed = 42
t_end = "10m"
equity_sample = "1s"
capital_base = "1000000"

[[instrument]]
symbol = "SYNTH"
tick_size = "0.01"
lot_size = "1.0"

[[flow]]
kind = "poisson"
symbol = "SYNTH"
owner = 0

[flow.poisson]
limit_rate = 40.0
market_rate = 4.0
cancel_rate = 12.0
initial_mid_ticks = 10000

[[strategy]]
kind = "naive_mm"
name = "mm"
owner = 1

[strategy.params]
symbol_index = 0
size_lots = 5
requote_ms = 250

[study]
strategy = "mm"
param = "half_spread_ticks"
values = [1, 2, 3, 4, 6, 8]
